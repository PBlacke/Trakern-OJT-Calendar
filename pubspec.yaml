name: ojt_app
description: OJT Calendar and Time Tracker
publish_to: 'none'  # Remove this line if you plan to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '^3.11.0'    # Matches your Dart version

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.9.0
  intl: ^0.20.2
  table_calendar: ^3.1.0
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  excel: ^4.0.0           # for creating Excel files
  share_plus: ^12.0.1    # for sharing/saving files
  path_provider: ^2.1.0  # to get temporary directory
  flutter_pdfview: ^1.4.0 # optional for viewing PDF
  pdf: ^3.10.0           # for PDF generation (if we decide PDF)
  printing: ^5.14.3
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true